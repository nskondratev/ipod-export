version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - cyclop
    - decorder
    - dogsled
    - dupl
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - copyloopvar
    - forbidigo
    - funlen
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gosec
    - govet
    - importas
    - ineffassign
    - staticcheck
    - unused
    - lll
    - makezero
    - misspell
    - nakedret
    - nestif
    - nilnil
    - nlreturn
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - rowserrcheck
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
    - wsl_v5
  settings:
    funlen:
      lines: 120
      statements: 40
    gocognit:
      min-complexity: 10
    nestif:
      min-complexity: 4
    gocyclo:
      min-complexity: 10
  exclusions:
    generated: lax
    rules:
      - path: _test.go
        linters:
          - funlen
          - dupl
          - copyloopvar
          - cyclop
          - gocognit
          - goconst
          - gocyclo
          - nlreturn
          - wsl_v5
          - revive
          - staticcheck
      - path: scripts
        linters:
          - forbidigo
          - gocritic
          - revive
          - wsl_v5
      - path: cmd/loadtest
        linters:
          - errcheck
          - gocognit
          - gocyclo
          - gosec
          - lll
          - noctx
          - nlreturn
          - prealloc
          - wsl_v5

formatters:
  enable:
    - gofmt
    - goimports
